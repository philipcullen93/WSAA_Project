<!DOCTYPE html>
<html>
<head>
    <title>F1 Race Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>F1 Race Tracker</h1>

    <!-- Form to add a new race -->
    <h2>Add Race</h2>
    <form id="raceForm">
        <input type="text" id="name" placeholder="Race Name" required>
        <input type="text" id="location" placeholder="Location" required>
        <input type="text" id="date" placeholder="Date" required>
        <button type="submit">Add Race</button>
    </form>

    <!-- Display races -->
    <h2>Races</h2>
    <ul id="raceList"></ul>

    <hr>

    <!-- Form to add a new result -->
    <h2>Add Race Result</h2>
    <form id="resultForm">
        <select id="raceId" required>
            <option value="">Select Race</option>
        </select>

        <input type="text" id="driverName" placeholder="Driver Name" required>
        <input type="number" id="position" placeholder="Position" min="1" required>
        <input type="number" id="points" placeholder="Points" min="0" required>

        <button type="submit">Add Result</button>
    </form>

    <!-- Display results -->
    <h2>Race Results</h2>
    <ul id="resultList"></ul>

    <!-- Link to JavaScript -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
